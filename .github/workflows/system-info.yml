name: GitHub Runner Architecture

on:
  workflow_dispatch:

jobs:
  system-info:
    runs-on: ubuntu-latest

    steps:
      - name: Basic System Info
        run: |
          echo "===== OS INFO ====="
          uname -a
          cat /etc/os-release

      - name: CPU Information
        run: |
          echo "===== CPU INFO ====="
          lscpu

      - name: Memory Information
        run: |
          echo "===== RAM INFO ====="
          free -h

      - name: Disk Information
        run: |
          echo "===== DISK INFO ====="
          df -h

      - name: Storage Devices
        run: |
          echo "===== STORAGE DEVICES ====="
          lsblk

      - name: Processor Details
        run: |
          echo "===== PROCESSOR DETAILS ====="
          cat /proc/cpuinfo

      - name: Memory Details
        run: |
          echo "===== MEMORY DETAILS ====="
          cat /proc/meminfo

      - name: Architecture Details
        run: |
          echo "===== ARCHITECTURE ====="
          arch
          getconf LONG_BIT
          uname -m

      - name: Network Information
        run: |
          echo "===== NETWORK ====="
          ip addr

      - name: Environment Variables
        run: |
          echo "===== ENVIRONMENT VARIABLES ====="
          env | sort

      - name: GitHub Runner Information
        run: |
          echo "===== GITHUB RUNNER ====="
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Runner Name: $RUNNER_NAME"
          echo "Workspace: $GITHUB_WORKSPACE"

      - name: Installed Tools
        run: |
          echo "===== NODE ====="
          node -v || true

          echo "===== NPM ====="
          npm -v || true

          echo "===== PYTHON ====="
          python3 --version || true

          echo "===== JAVA ====="
          java -version || true

          echo "===== DOCKER ====="
          docker --version || true
